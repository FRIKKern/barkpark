name: ci

# Lighthouse CI against the Next.js demo at web/ (Vercel-deployed).
#
# Phase 8 slice 8.0 originally targeted apps/demo, which is being retired
# by PR #60 (web/scaffold-1) in favour of a standalone web/ Next.js app.
# Task #34 repoints this workflow at web/ and adds a paths filter so the
# job only runs on changes that can plausibly affect Lighthouse scores —
# unrelated API/Studio/docs PRs no longer pay the ~2 minute cost.
#
# Still fail-soft (continue-on-error: true) — scores are runner-noise
# sensitive and lighthouserc.json assertions are `warn`. A follow-up can
# tighten to `error` once baselines stabilise on web/.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "lighthouserc.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "web/**"
      - "lighthouserc.json"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI — web/
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect web app presence
        id: detect
        run: |
          if [ -d web ] && [ -f web/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — web/ not present
        if: steps.detect.outputs.present != 'true'
        run: echo "web/ not found — Lighthouse job skipped."

      - name: Setup Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.detect.outputs.present == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install web/ deps
        if: steps.detect.outputs.present == 'true'
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web/
        if: steps.detect.outputs.present == 'true'
        working-directory: web
        run: pnpm run build

      - name: Start web/ (background)
        if: steps.detect.outputs.present == 'true'
        working-directory: web
        run: |
          pnpm run start &
          echo $! > /tmp/web.pid
          # Wait for server to respond on :3000
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "web server is up"
              exit 0
            fi
            sleep 2
          done
          echo "web server did not start within 120s"
          exit 1

      - name: Run Lighthouse CI
        if: steps.detect.outputs.present == 'true'
        run: pnpm dlx @lhci/cli@latest autorun --config=./lighthouserc.json

      - name: Stop web/
        if: always() && steps.detect.outputs.present == 'true'
        run: |
          if [ -f /tmp/web.pid ]; then
            kill "$(cat /tmp/web.pid)" 2>/dev/null || true
          fi

      - name: Upload Lighthouse artifact
        if: always() && steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            .lighthouseci/
            lhci_reports/
          if-no-files-found: ignore
          retention-days: 14
