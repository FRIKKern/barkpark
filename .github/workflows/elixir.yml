name: elixir

# Phase 2 / WI4 — Elixir CI gate.
#
# Jobs:
#   1. format           — `mix format --check-formatted`. Blocking. Runs
#                         first so an unformatted PR fails in <60s without
#                         spinning up Postgres or compiling. (Task #29 —
#                         see PR #58/#59 mix-format hotfixes.)
#   2. mix-test         — dev-mode compile + test suite. Advisory.
#   3. mix-prod-compile — repeats compile with MIX_ENV=prod and a clean
#                         _build/prod, --warnings-as-errors enforced.
#
# Why a dedicated `format` job? The format check used to live inside
# `mix-test`, which is `continue-on-error: true` while the test suite is
# remediated. That meant unformatted code merged twice (PR #58, PR #59)
# and required follow-up "mix format pass" PRs. Splitting format out into
# its own blocking, fast job — the standard Elixir/Phoenix CI pattern —
# closes that hole without making the advisory test job blocking yet.
#
# Why a separate prod-compile job?
# PR #42 (Phase 1) introduced a `runtime.exs` `when`-guard that referenced a
# macro. The construct is legal in :dev but rejected only by the prod compiler,
# so static review and `mix test` both passed; production compile failed and
# required the PR #43 hotfix. From this slice forward every PR must clear a
# clean MIX_ENV=prod compile before merge. See docs/ops/merge-gates.md and
# CLAUDE.md "Past Mistakes" for the full post-mortem.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: elixir-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    # Blocking format gate. Fast (~30s, no DB, no full compile) so it
    # short-circuits unformatted PRs before the heavier jobs run.
    name: Format (mix format --check-formatted)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp: ["27.0"]
        elixir: ["1.18.1"]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps (formatter only needs deps for import_deps)
        uses: actions/cache@v4
        with:
          path: api/deps
          key: ${{ runner.os }}-mix-format-deps-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('api/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-format-deps-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Fetch deps (required by .formatter.exs import_deps)
        run: mix deps.get

      - name: mix format --check-formatted
        run: mix format --check-formatted

  mix-test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    # ADVISORY job — failures do not block merge while pre-existing test-infra
    # drift is being remediated (see Task #2 triage report 2026-04-26 + 6 fix
    # groups in flight). Compile + format + prod-compile-gate are blocking.
    # Once Group A-F land, remove continue-on-error to make tests blocking.
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: barkpark_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost:5432/barkpark_test
      SECRET_KEY_BASE: ci-secret-key-base-not-used-in-test-env-just-needs-64-chars-padding
      BARKPARK_CLOAK_KEY: ci-cloak-key-32-chars-padding-aaa
      PREVIEW_JWT_SECRET: ci-preview-jwt-secret-not-used-padding
    strategy:
      fail-fast: false
      matrix:
        # api/mix.exs requires `~> 1.15`. Track production server (ASDF) when
        # bumped; update both .tool-versions (when added) and this matrix.
        otp: ["27.0"]
        elixir: ["1.18.1"]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            api/deps
            api/_build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('api/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Fetch deps
        run: mix deps.get

      # Format check now lives in the dedicated `format` job above (Task
      # #29). It used to run here but was non-blocking because mix-test
      # carries continue-on-error: true.

      - name: Compile (dev, --warnings-as-errors)
        run: mix compile --warnings-as-errors

      - name: DB setup
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Test
        run: mix test

  mix-prod-compile:
    # The merge gate. See docs/ops/merge-gates.md.
    name: Prod compile gate (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    needs: mix-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp: ["27.0"]
        elixir: ["1.18.1"]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps (prod build is intentionally NOT cached)
        uses: actions/cache@v4
        with:
          path: api/deps
          key: ${{ runner.os }}-mix-prod-deps-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('api/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-prod-deps-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Clean prod build (Golden Rule #1 — no partial cleans)
        run: rm -rf _build/prod
        env:
          MIX_ENV: prod

      - name: Fetch deps (prod)
        run: mix deps.get
        env:
          MIX_ENV: prod

      - name: Force-recompile deps (prod)
        run: mix deps.compile --force
        env:
          MIX_ENV: prod

      - name: Prod compile (--warnings-as-errors)
        # The gate. If this fails, the PR must be fixed before merge.
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: prod

  validation-perf:
    # Phase 3 WI4 — cross-field validation perf gate. Independent of mix-test
    # (which is advisory) so a perf regression blocks merge even while the
    # test suite is being remediated, and a flaky test does not mask perf
    # drift. Runs the synthetic 200-field / 100-rule bench, takes the median
    # of 5 timed runs, fails the job if median > 100ms.
    name: Validation perf bench (median-of-5, alarm >100ms)
    runs-on: ubuntu-latest-4-core
    env:
      MIX_ENV: test
    strategy:
      fail-fast: false
      matrix:
        otp: ["27.0"]
        elixir: ["1.18.1"]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            api/deps
            api/_build
          key: ${{ runner.os }}-mix-perf-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('api/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-perf-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Fetch deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run validation perf bench (median-of-5, fail if >100ms)
        # --no-start skips OTP app boot. The bench is pure-compute; we don't
        # need Postgres just to time the rule evaluator.
        run: mix run --no-start bench/validation_perf.exs
