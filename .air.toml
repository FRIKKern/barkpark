root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/sanity-tui"
  cmd = "go build -o ./tmp/sanity-tui ."
  delay = 200
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_file = ["data.json"]
  exclude_regex = ["_test.go"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
